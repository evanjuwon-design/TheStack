<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Stack — Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0F10;
    --bg2: #141416;
    --bg3: #1A1A1D;
    --border: #252528;
    --text: #E2DAD0;
    --text2: #8A8480;
    --text3: #4A4A50;
    --gold: #C4A25A;
    --gold2: #A8883C;
    --green: #6A9F7A;
    --red: #9F6A6A;
    --blue: #6A7F9F;
    --reading-bg: #111113;
    --reading-text: #DDD5C8;
    --reading-width: 680px;
    --font-body: 'Crimson Pro', Georgia, serif;
    --font-ui: 'Lora', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ——— SCREENS ——— */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }

  /* ——— LIBRARY SCREEN ——— */
  #library-screen { padding-bottom: 100px; }

  .app-header {
    padding: 40px 24px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }

  .app-header-top {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 16px;
  }

  .app-title-label {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 4px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 4px;
  }

  .app-title {
    font-family: var(--font-ui); font-size: 24px; font-weight: 400;
    color: var(--text); letter-spacing: -0.3px;
  }

  .stats-row {
    display: flex; gap: 18px;
    font-family: var(--font-mono); font-size: 11px; color: var(--text3);
  }

  .stat-val { color: var(--gold); }

  .tab-row {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    padding: 0 24px; background: var(--bg);
  }

  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text3); font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; padding: 12px 0;
    margin-right: 24px; cursor: pointer; transition: all 0.2s;
  }

  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .tab-content { display: none; padding: 20px 24px; }
  .tab-content.active { display: block; }

  /* Search */
  .search-bar {
    display: flex; gap: 10; margin-bottom: 16px;
  }

  .input-field {
    flex: 1; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); padding: 10px 14px;
    font-size: 14px; font-family: var(--font-body); outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--gold); }
  .input-field::placeholder { color: var(--text3); }

  /* Library items */
  .item-list { display: flex; flex-direction: column; gap: 1px; }

  .library-item {
    background: var(--bg2); border-left: 2px solid transparent;
    padding: 14px 18px; cursor: pointer; transition: all 0.15s;
    display: flex; justify-content: space-between; align-items: flex-start;
  }

  .library-item:hover, .library-item:active { background: var(--bg3); }
  .library-item.status-reading { border-left-color: var(--gold); }
  .library-item.status-completed { border-left-color: var(--green); }
  .library-item.status-queued { border-left-color: var(--text3); }

  .item-title { font-size: 15px; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
  .item-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
  .item-badge {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 2px;
    white-space: nowrap; margin-left: 10px; margin-top: 2px;
  }

  .badge-reading { color: var(--gold); background: rgba(196,162,90,0.1); }
  .badge-completed { color: var(--green); background: rgba(106,159,122,0.1); }
  .badge-queued { color: var(--text3); background: rgba(74,74,80,0.15); }

  .progress-bar-wrap { height: 2px; background: var(--border); margin-top: 6px; border-radius: 1px; }
  .progress-bar { height: 2px; background: var(--gold); border-radius: 1px; transition: width 0.3s; }

  /* Quotes list */
  .quote-card {
    border-left: 1px solid var(--border); padding-left: 16px;
    margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--bg2);
  }

  .quote-text {
    font-size: 16px; color: #C8C0B4; line-height: 1.75; font-style: italic;
    margin-bottom: 8px;
  }

  .quote-source { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }

  .quote-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .quote-tag {
    font-family: var(--font-mono); font-size: 9px; color: var(--text3);
    background: var(--bg3); padding: 2px 8px; letter-spacing: 1px;
  }

  /* ——— ADD ARTICLE FORM ——— */
  .form-section { margin-bottom: 20px; }
  .form-label {
    display: block; font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 2px; color: var(--text3); text-transform: uppercase;
    margin-bottom: 8px;
  }

  .select-field {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); padding: 10px 14px;
    font-size: 14px; outline: none;
  }

  .textarea-field {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); padding: 10px 14px;
    font-size: 14px; font-family: var(--font-body); outline: none;
    resize: vertical; min-height: 80px; line-height: 1.6;
  }

  .btn-primary {
    width: 100%; background: var(--gold); border: none; color: #0F0F10;
    padding: 14px; font-size: 12px; font-family: var(--font-mono);
    letter-spacing: 3px; cursor: pointer; border-radius: 3px;
    text-transform: uppercase; transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--gold2); }

  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--text3);
    padding: 9px 16px; font-size: 10px; font-family: var(--font-mono);
    letter-spacing: 2px; cursor: pointer; border-radius: 3px;
    text-transform: uppercase; transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  .back-btn {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
    padding: 0; display: flex; align-items: center; gap: 6px;
    text-transform: uppercase; margin-bottom: 24px;
  }

  .empty-state {
    text-align: center; color: var(--text3); padding: 60px 0;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
    line-height: 2;
  }

  /* FAB */
  .fab {
    position: fixed; bottom: 28px; right: 24px; width: 52px; height: 52px;
    background: var(--gold); border: none; border-radius: 50%; font-size: 22px;
    color: #0F0F10; cursor: pointer; box-shadow: 0 4px 20px rgba(196,162,90,0.3);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:active { transform: scale(0.94); }

  /* ——— READER SCREEN ——— */
  #reader-screen {
    background: var(--reading-bg);
    padding-bottom: 80px;
  }

  .reader-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(15,15,16,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 14px;
  }

  .reader-back {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 4px; flex-shrink: 0;
  }

  .reader-title-wrap { flex: 1; overflow: hidden; }

  .reader-title {
    font-family: var(--font-ui); font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .reader-meta {
    font-family: var(--font-mono); font-size: 9px; color: var(--text3);
    letter-spacing: 1px; margin-top: 2px;
  }

  .reader-progress-wrap {
    position: sticky; top: 53px; z-index: 49;
    height: 2px; background: var(--border);
  }

  .reader-progress-fill {
    height: 100%; background: var(--gold); transition: width 0.1s;
  }

  .reader-body {
    max-width: var(--reading-width);
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  .reader-article-title {
    font-family: var(--font-ui); font-size: 28px; font-weight: 400;
    line-height: 1.25; color: var(--text); margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  .reader-byline {
    font-family: var(--font-mono); font-size: 11px; color: var(--text3);
    letter-spacing: 1px; margin-bottom: 36px; padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .reader-content {
    font-size: 19px; line-height: 1.85; color: var(--reading-text);
    user-select: text; -webkit-user-select: text;
  }

  .reader-content p { margin-bottom: 1.4em; }
  .reader-content h1, .reader-content h2, .reader-content h3 {
    font-family: var(--font-ui); font-weight: 400; margin: 1.6em 0 0.6em;
    color: var(--text);
  }
  .reader-content h1 { font-size: 22px; }
  .reader-content h2 { font-size: 19px; }
  .reader-content h3 { font-size: 17px; }
  .reader-content a { color: var(--gold); text-decoration: none; }
  .reader-content blockquote {
    border-left: 2px solid var(--gold); padding-left: 20px;
    margin: 1.6em 0; color: var(--text2); font-style: italic;
  }
  .reader-content img { max-width: 100%; height: auto; margin: 1em 0; opacity: 0.85; }

  /* Loading */
  .loading-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 24px; gap: 16px;
  }

  .loading-spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--font-mono); font-size: 10px; color: var(--text3);
    letter-spacing: 2px; text-transform: uppercase;
  }

  /* ——— SELECTION POPUP ——— */
  #selection-popup {
    position: fixed; z-index: 200;
    background: #1C1C20; border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none; overflow: hidden;
    animation: popIn 0.15s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(4px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .popup-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; background: none; border: none; color: var(--text);
    padding: 12px 16px; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
    transition: background 0.15s; white-space: nowrap;
  }
  .popup-btn:hover { background: var(--bg3); }
  .popup-btn + .popup-btn { border-top: 1px solid var(--border); }
  .popup-btn .popup-icon { font-size: 14px; }

  /* ——— DICTIONARY PANEL ——— */
  #dict-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
    background: #18181C; border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 70vh; overflow-y: auto;
    padding: 20px 24px 40px;
  }

  #dict-panel.open { transform: translateY(0); }

  .dict-handle {
    width: 36px; height: 3px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }

  .dict-word {
    font-family: var(--font-ui); font-size: 24px; font-weight: 400;
    color: var(--text); margin-bottom: 4px;
  }

  .dict-phonetic {
    font-family: var(--font-mono); font-size: 12px; color: var(--gold);
    margin-bottom: 16px;
  }

  .dict-pos {
    font-family: var(--font-mono); font-size: 9px; color: var(--text3);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
    margin-top: 16px;
  }

  .dict-def {
    font-size: 16px; color: var(--text2); line-height: 1.6; margin-bottom: 8px;
  }

  .dict-example {
    font-size: 14px; color: var(--text3); font-style: italic;
    line-height: 1.6; margin-top: 4px; padding-left: 12px;
    border-left: 1px solid var(--border);
  }

  .dict-close {
    position: absolute; top: 20px; right: 20px;
    background: none; border: none; color: var(--text3);
    font-size: 20px; cursor: pointer; padding: 4px;
  }

  /* ——— QUOTE SAVE PANEL ——— */
  #quote-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
    background: #18181C; border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    padding: 20px 24px 40px;
  }

  #quote-panel.open { transform: translateY(0); }

  .panel-title {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 14px;
  }

  .quote-preview {
    font-size: 15px; color: #B8B0A4; font-style: italic; line-height: 1.65;
    padding: 12px 16px; background: var(--bg3); border-left: 2px solid var(--gold);
    margin-bottom: 16px; border-radius: 0 3px 3px 0;
    max-height: 120px; overflow-y: auto;
  }

  /* ——— OVERLAY ——— */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 250; display: none;
  }

  #overlay.active { display: block; }

  /* ——— TOAST ——— */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #252528; border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 6px; font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 1px; opacity: 0; transition: all 0.3s;
    z-index: 400; white-space: nowrap;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ——— ADD SCREEN ——— */
  #add-screen { padding: 0 24px 40px; }
  #add-screen .screen-header {
    padding: 40px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }

  /* Misc */
  .row { display: flex; gap: 10px; }
  .flex-1 { flex: 1; }

  .delete-btn {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 16px; padding: 4px; line-height: 1;
    transition: color 0.2s;
  }
  .delete-btn:hover { color: var(--red); }

  @media (max-width: 480px) {
    .reader-content { font-size: 17px; }
    .reader-article-title { font-size: 23px; }
    .reader-body { padding: 28px 20px 60px; }
  }
</style>
</head>
<body>

<!-- ——— LIBRARY SCREEN ——— -->
<div id="library-screen" class="screen active">
  <div class="app-header">
    <div class="app-header-top">
      <div>
        <div class="app-title-label">Reading Log</div>
        <div class="app-title">The Stack</div>
      </div>
      <div class="stats-row">
        <span><span class="stat-val" id="stat-reading">0</span> active</span>
        <span><span class="stat-val" id="stat-done">0</span> done</span>
        <span><span class="stat-val" id="stat-quotes">0</span> ❝</span>
      </div>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('library')">Library</button>
    <button class="tab-btn" onclick="switchTab('quotes')">Quotes</button>
  </div>

  <!-- Library tab -->
  <div id="tab-library" class="tab-content active">
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <input id="search-input" class="input-field" placeholder="Search…" oninput="renderLibrary()" style="flex:1;min-width:120px;">
      <div style="display:flex;gap:6px;">
        <button class="btn-ghost filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="btn-ghost filter-btn" data-filter="reading" onclick="setFilter('reading',this)">Reading</button>
        <button class="btn-ghost filter-btn" data-filter="completed" onclick="setFilter('completed',this)">Done</button>
        <button class="btn-ghost filter-btn" data-filter="queued" onclick="setFilter('queued',this)">Queue</button>
      </div>
    </div>
    <div id="library-list" class="item-list"></div>
  </div>

  <!-- Quotes tab -->
  <div id="tab-quotes" class="tab-content">
    <div id="quotes-list"></div>
  </div>

  <button class="fab" onclick="showAddScreen()">+</button>
</div>

<!-- ——— ADD SCREEN ——— -->
<div id="add-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showLibrary()">← Back</button>
    <div class="app-title-label">New Entry</div>
    <div class="app-title" style="font-size:20px;">Add to Stack</div>
  </div>

  <div class="form-section">
    <label class="form-label">Article / Book URL</label>
    <input id="add-url" class="input-field" style="width:100%;" placeholder="https://example.com/article…" type="url">
  </div>

  <div class="form-section">
    <label class="form-label">Title *</label>
    <input id="add-title" class="input-field" style="width:100%;" placeholder="Title of the piece">
  </div>

  <div class="form-section">
    <label class="form-label">Author / Publication</label>
    <input id="add-author" class="input-field" style="width:100%;" placeholder="Author or source">
  </div>

  <div class="row" style="margin-bottom:20px;">
    <div class="flex-1">
      <label class="form-label">Type</label>
      <select id="add-type" class="select-field">
        <option value="article">Article</option>
        <option value="essay">Essay</option>
        <option value="book">Book</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="flex-1">
      <label class="form-label">Status</label>
      <select id="add-status" class="select-field">
        <option value="queued">Queued</option>
        <option value="reading">Reading</option>
        <option value="completed">Completed</option>
      </select>
    </div>
  </div>

  <div class="form-section">
    <label class="form-label">Notes (optional)</label>
    <textarea id="add-notes" class="textarea-field" placeholder="Why you're reading this, initial thoughts…"></textarea>
  </div>

  <button class="btn-primary" onclick="saveItem()">Add to Stack</button>
</div>

<!-- ——— READER SCREEN ——— -->
<div id="reader-screen" class="screen">
  <div class="reader-header">
    <button class="reader-back" onclick="exitReader()">←</button>
    <div class="reader-title-wrap">
      <div class="reader-title" id="reader-header-title">Loading…</div>
      <div class="reader-meta" id="reader-header-meta"></div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button class="btn-ghost" style="padding:6px 10px;font-size:9px;" onclick="cycleFont()">Aa</button>
    </div>
  </div>

  <div class="reader-progress-wrap">
    <div class="reader-progress-fill" id="reader-progress" style="width:0%"></div>
  </div>

  <div class="reader-body" id="reader-body">
    <div class="loading-wrap" id="reader-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Fetching article…</div>
    </div>
    <div id="reader-content-wrap" style="display:none;">
      <h1 class="reader-article-title" id="reader-article-title"></h1>
      <div class="reader-byline" id="reader-byline"></div>
      <div class="reader-content" id="reader-content" onmouseup="handleSelection(event)" ontouchend="handleSelection(event)"></div>
    </div>
  </div>
</div>

<!-- ——— SELECTION POPUP ——— -->
<div id="selection-popup">
  <button class="popup-btn" onclick="doSaveQuote()"><span class="popup-icon">❝</span> Save Quote</button>
  <button class="popup-btn" onclick="doLookupWord()"><span class="popup-icon">◉</span> Define Word</button>
</div>

<!-- ——— DICTIONARY PANEL ——— -->
<div id="dict-panel">
  <button class="dict-close" onclick="closeDict()">×</button>
  <div class="dict-handle"></div>
  <div id="dict-content">
    <div class="loading-wrap"><div class="loading-spinner"></div></div>
  </div>
</div>

<!-- ——— QUOTE PANEL ——— -->
<div id="quote-panel">
  <div class="panel-title">Save Quote</div>
  <div class="quote-preview" id="quote-preview-text"></div>
  <div class="form-section">
    <label class="form-label">Tags (comma-separated)</label>
    <input id="quote-tags-input" class="input-field" style="width:100%;" placeholder="e.g. identity, language, form">
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn-primary" style="flex:1;" onclick="confirmSaveQuote()">Save</button>
    <button class="btn-ghost" onclick="closeQuotePanel()">Cancel</button>
  </div>
</div>

<!-- ——— OVERLAY ——— -->
<div id="overlay" onclick="closeAllPanels()"></div>

<!-- ——— TOAST ——— -->
<div id="toast"></div>

<script>
// ——— STATE ———
let db = {
  items: JSON.parse(localStorage.getItem('ts_items') || '[]'),
  quotes: JSON.parse(localStorage.getItem('ts_quotes') || '[]'),
  progress: JSON.parse(localStorage.getItem('ts_progress') || '{}'),
};

let currentItemId = null;
let currentFilter = 'all';
let selectedText = '';
let selectedRange = null;
let fontSizes = [17, 19, 21];
let fontIdx = 1;

function save() {
  localStorage.setItem('ts_items', JSON.stringify(db.items));
  localStorage.setItem('ts_quotes', JSON.stringify(db.quotes));
  localStorage.setItem('ts_progress', JSON.stringify(db.progress));
}

// ——— SCREENS ———
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showLibrary() {
  showScreen('library-screen');
  renderLibrary();
  renderQuotes();
  updateStats();
}

function showAddScreen() {
  document.getElementById('add-url').value = '';
  document.getElementById('add-title').value = '';
  document.getElementById('add-author').value = '';
  document.getElementById('add-notes').value = '';
  document.getElementById('add-type').value = 'article';
  document.getElementById('add-status').value = 'queued';
  showScreen('add-screen');
}

// ——— TABS ———
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'quotes') renderQuotes();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLibrary();
}

// ——— LIBRARY ———
function updateStats() {
  document.getElementById('stat-reading').textContent = db.items.filter(i => i.status === 'reading').length;
  document.getElementById('stat-done').textContent = db.items.filter(i => i.status === 'completed').length;
  document.getElementById('stat-quotes').textContent = db.quotes.length;
}

function renderLibrary() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let items = db.items.filter(i => {
    const matchF = currentFilter === 'all' || i.status === currentFilter;
    const matchS = !search || i.title.toLowerCase().includes(search) || (i.author || '').toLowerCase().includes(search);
    return matchF && matchS;
  });

  const list = document.getElementById('library-list');

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state">${db.items.length === 0 ? 'Your stack is empty.<br>Tap + to add something.' : 'No matches.'}</div>`;
    return;
  }

  list.innerHTML = items.map(item => {
    const prog = db.progress[item.id] || 0;
    const qCount = db.quotes.filter(q => q.itemId === item.id).length;
    const badges = { reading: 'badge-reading', completed: 'badge-completed', queued: 'badge-badge' };
    const labels = { reading: 'Reading', completed: 'Done', queued: 'Queued' };
    return `
      <div class="library-item status-${item.status}" onclick="openItem('${item.id}')">
        <div style="flex:1;min-width:0;">
          <div class="item-title">${escHtml(item.title)}</div>
          <div class="item-meta">${escHtml(item.author || '')}${qCount ? ` · ${qCount} quote${qCount>1?'s':''}` : ''}</div>
          ${item.status === 'reading' ? `<div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%"></div></div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-left:10px;">
          <span class="item-badge badge-${item.status}">${labels[item.status]}</span>
          ${item.url ? `<span style="font-family:var(--font-mono);font-size:9px;color:var(--text3);">↗</span>` : ''}
        </div>
      </div>`;
  }).join('');
  updateStats();
}

function renderQuotes() {
  const list = document.getElementById('quotes-list');
  if (db.quotes.length === 0) {
    list.innerHTML = '<div class="empty-state">No quotes saved yet.<br>Highlight text while reading to save.</div>';
    return;
  }
  list.innerHTML = db.quotes.slice().reverse().map(q => {
    const item = db.items.find(i => i.id === q.itemId);
    return `
      <div class="quote-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
          <div class="quote-text">"${escHtml(q.text)}"</div>
          <button class="delete-btn" onclick="deleteQuote('${q.id}')">×</button>
        </div>
        <div class="quote-source">— ${escHtml(item ? item.title : (q.source || 'Unknown'))}</div>
        ${q.tags && q.tags.length ? `<div class="quote-tags">${q.tags.map(t => `<span class="quote-tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
      </div>`;
  }).join('');
}

function deleteQuote(id) {
  db.quotes = db.quotes.filter(q => q.id !== id);
  save();
  renderQuotes();
  updateStats();
}

// ——— ADD ITEM ———
function saveItem() {
  const title = document.getElementById('add-title').value.trim();
  if (!title) { toast('Title is required'); return; }
  const item = {
    id: Date.now().toString(),
    title,
    author: document.getElementById('add-author').value.trim(),
    url: document.getElementById('add-url').value.trim(),
    type: document.getElementById('add-type').value,
    status: document.getElementById('add-status').value,
    notes: document.getElementById('add-notes').value.trim(),
    createdAt: Date.now(),
  };
  db.items.unshift(item);
  save();
  toast('Added to stack');
  showLibrary();
}

// ——— OPEN ITEM ———
function openItem(id) {
  const item = db.items.find(i => i.id === id);
  if (!item) return;
  currentItemId = id;

  document.getElementById('reader-header-title').textContent = item.title;
  document.getElementById('reader-header-meta').textContent = item.author || '';
  document.getElementById('reader-loading').style.display = 'flex';
  document.getElementById('reader-content-wrap').style.display = 'none';
  document.getElementById('reader-progress').style.width = (db.progress[id] || 0) + '%';

  showScreen('reader-screen');

  if (item.url) {
    fetchArticle(item);
  } else {
    // No URL — show notes or placeholder
    document.getElementById('reader-loading').style.display = 'none';
    document.getElementById('reader-content-wrap').style.display = 'block';
    document.getElementById('reader-article-title').textContent = item.title;
    document.getElementById('reader-byline').textContent = item.author || '';
    document.getElementById('reader-content').innerHTML = item.notes
      ? `<p>${escHtml(item.notes).replace(/\n/g, '</p><p>')}</p>`
      : `<p style="color:var(--text3);font-style:italic;">No URL or content added. Edit this entry to add a link so the article can be fetched.</p>`;
    restoreScroll(id);
  }

  // Mark as reading
  if (item.status === 'queued') {
    item.status = 'reading';
    save();
  }
}

// ——— FETCH ARTICLE ———
async function fetchArticle(item) {
  const proxies = [
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  ];

  let html = null;

  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy(item.url), { signal: AbortSignal.timeout(12000) });
      if (!res.ok) continue;
      const data = await res.json().catch(() => null);
      if (data && data.contents) { html = data.contents; break; }
      const text = await res.text().catch(() => null);
      if (text && text.length > 200) { html = text; break; }
    } catch (e) { continue; }
  }

  if (!html) {
    document.getElementById('reader-loading').style.display = 'none';
    document.getElementById('reader-content-wrap').style.display = 'block';
    document.getElementById('reader-article-title').textContent = item.title;
    document.getElementById('reader-byline').textContent = item.author || '';
    document.getElementById('reader-content').innerHTML = `
      <p style="color:var(--text3);">Could not fetch this article — it may be behind a paywall or the server blocked the request.</p>
      <p style="margin-top:1em;"><a href="${escHtml(item.url)}" target="_blank" style="color:var(--gold);">Open in browser ↗</a></p>`;
    return;
  }

  const cleaned = parseArticle(html, item.url);
  document.getElementById('reader-loading').style.display = 'none';
  document.getElementById('reader-content-wrap').style.display = 'block';
  document.getElementById('reader-article-title').textContent = cleaned.title || item.title;
  document.getElementById('reader-byline').textContent = cleaned.byline || item.author || '';
  document.getElementById('reader-content').innerHTML = cleaned.content;

  restoreScroll(item.id);
  setupScrollTracking(item.id);
}

// ——— ARTICLE PARSER ———
function parseArticle(html, baseUrl) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Set base for relative URLs
  const base = doc.createElement('base');
  base.href = baseUrl;
  doc.head.appendChild(base);

  // Remove junk
  ['script','style','nav','header','footer','aside','form',
   '.nav','.header','.footer','.sidebar','.ad','.advertisement',
   '.cookie','[role="navigation"]','[role="banner"]','[role="complementary"]',
   '.social','.share','.comments','.related','.newsletter','iframe','noscript'].forEach(sel => {
    try { doc.querySelectorAll(sel).forEach(el => el.remove()); } catch(e) {}
  });

  // Title
  const title = (doc.querySelector('h1')?.textContent ||
    doc.querySelector('meta[property="og:title"]')?.content ||
    doc.querySelector('title')?.textContent || '').trim();

  // Byline
  const byline = (doc.querySelector('[class*="author"],[rel="author"],[itemprop="author"]')?.textContent ||
    doc.querySelector('meta[name="author"]')?.content || '').trim().slice(0, 100);

  // Find main content
  const selectors = [
    'article', '[role="main"]', 'main', '.article-body', '.post-content',
    '.entry-content', '.content', '#content', '.story-body', '.article__body'
  ];

  let contentEl = null;
  for (const sel of selectors) {
    const el = doc.querySelector(sel);
    if (el && el.textContent.trim().length > 200) { contentEl = el; break; }
  }

  if (!contentEl) {
    // Fallback: find element with most text
    let best = null, bestLen = 0;
    doc.querySelectorAll('div, section').forEach(el => {
      const l = el.textContent.trim().length;
      if (l > bestLen && l < 100000) { bestLen = l; best = el; }
    });
    contentEl = best || doc.body;
  }

  // Clean content
  if (contentEl) {
    contentEl.querySelectorAll('figure img').forEach(img => {
      img.src = img.src; // resolve URL
      img.removeAttribute('srcset');
    });
    // Remove small divs that look like UI chrome
    contentEl.querySelectorAll('div,span').forEach(el => {
      if (el.children.length === 0 && el.textContent.trim().length < 5) el.remove();
    });
  }

  const content = contentEl ? contentEl.innerHTML : '<p>Could not parse article content.</p>';

  return { title, byline, content };
}

// ——— SCROLL TRACKING ———
function restoreScroll(id) {
  const prog = db.progress[id] || 0;
  if (prog > 0) {
    setTimeout(() => {
      const el = document.getElementById('reader-screen');
      const scrollTarget = (el.scrollHeight - el.clientHeight) * (prog / 100);
      el.scrollTop = scrollTarget;
    }, 200);
  }
}

function setupScrollTracking(id) {
  const el = document.getElementById('reader-screen');
  let ticking = false;

  const onScroll = () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const scrollable = el.scrollHeight - el.clientHeight;
      if (scrollable <= 0) { ticking = false; return; }
      const prog = Math.round((el.scrollTop / scrollable) * 100);
      document.getElementById('reader-progress').style.width = prog + '%';
      db.progress[id] = prog;
      if (prog >= 95) {
        const item = db.items.find(i => i.id === id);
        if (item && item.status === 'reading') {
          item.status = 'completed';
          toast('Marked as completed ✓');
        }
      }
      save();
      ticking = false;
    });
  };

  el.removeEventListener('scroll', el._scrollHandler);
  el._scrollHandler = onScroll;
  el.addEventListener('scroll', onScroll, { passive: true });
}

function exitReader() {
  showLibrary();
  currentItemId = null;
}

// ——— FONT CYCLING ———
function cycleFont() {
  fontIdx = (fontIdx + 1) % fontSizes.length;
  document.getElementById('reader-content').style.fontSize = fontSizes[fontIdx] + 'px';
}

// ——— TEXT SELECTION ———
function handleSelection(e) {
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 2) {
      hidePopup();
      return;
    }
    selectedText = sel.toString().trim();

    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    showPopup(rect);
  }, 50);
}

function showPopup(rect) {
  const popup = document.getElementById('selection-popup');
  popup.style.display = 'block';

  const popW = 180;
  const popH = 88;
  let left = rect.left + (rect.width / 2) - (popW / 2);
  let top = rect.top - popH - 10 + window.scrollY;

  if (left < 8) left = 8;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if (top < 8 + window.scrollY) top = rect.bottom + 10 + window.scrollY;

  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.style.width = popW + 'px';
}

function hidePopup() {
  document.getElementById('selection-popup').style.display = 'none';
}

// ——— SAVE QUOTE ———
function doSaveQuote() {
  hidePopup();
  if (!selectedText) return;
  document.getElementById('quote-preview-text').textContent = `"${selectedText}"`;
  document.getElementById('quote-tags-input').value = '';
  openPanel('quote-panel');
}

function confirmSaveQuote() {
  const tags = document.getElementById('quote-tags-input').value
    .split(',').map(t => t.trim()).filter(Boolean);
  const item = db.items.find(i => i.id === currentItemId);
  db.quotes.push({
    id: Date.now().toString(),
    text: selectedText,
    itemId: currentItemId || '',
    source: item ? item.title : '',
    tags,
    createdAt: Date.now(),
  });
  save();
  closeQuotePanel();
  toast('Quote saved ❝');
  selectedText = '';
  window.getSelection()?.removeAllRanges();
}

function closeQuotePanel() {
  closePanel('quote-panel');
}

// ——— DICTIONARY ———
async function doLookupWord() {
  hidePopup();
  const word = selectedText.trim().split(/\s+/)[0].replace(/[^a-zA-Z'-]/g, '');
  if (!word) return;

  document.getElementById('dict-content').innerHTML = `<div class="loading-wrap"><div class="loading-spinner"></div><div class="loading-text">Looking up "${word}"…</div></div>`;
  openPanel('dict-panel');

  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    renderDict(data[0]);
  } catch (e) {
    document.getElementById('dict-content').innerHTML = `
      <div class="dict-word">${escHtml(word)}</div>
      <div style="color:var(--text3);font-family:var(--font-mono);font-size:12px;margin-top:12px;">No definition found.</div>`;
  }
}

function renderDict(entry) {
  if (!entry) return;
  const phonetic = entry.phonetics?.find(p => p.text)?.text || '';

  let html = `<div class="dict-word">${escHtml(entry.word)}</div>`;
  if (phonetic) html += `<div class="dict-phonetic">${escHtml(phonetic)}</div>`;

  (entry.meanings || []).slice(0, 3).forEach(m => {
    html += `<div class="dict-pos">${escHtml(m.partOfSpeech)}</div>`;
    (m.definitions || []).slice(0, 2).forEach((d, i) => {
      html += `<div class="dict-def">${i + 1}. ${escHtml(d.definition)}</div>`;
      if (d.example) html += `<div class="dict-example">"${escHtml(d.example)}"</div>`;
    });
  });

  document.getElementById('dict-content').innerHTML = html;
}

function closeDict() { closePanel('dict-panel'); }

// ——— PANELS ———
function openPanel(id) {
  document.getElementById(id).classList.add('open');
  document.getElementById('overlay').classList.add('active');
}

function closePanel(id) {
  document.getElementById(id).classList.remove('open');
  const anyOpen = document.querySelector('.open');
  if (!anyOpen) document.getElementById('overlay').classList.remove('active');
}

function closeAllPanels() {
  document.querySelectorAll('#dict-panel, #quote-panel').forEach(p => p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('active');
  hidePopup();
}

// ——— TOAST ———
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ——— UTILS ———
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close popup when tapping elsewhere
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('#selection-popup')) hidePopup();
});

// ——— INIT ———
renderLibrary();
renderQuotes();
updateStats();
</script>
</body>
</html>
